{% extends "base.html" %}
{% block title %}Criar Conta{% endblock %}

{% block content %}
<div class="card-auth mx-auto p-4" style="max-width:420px;">
    <div class="text-center mb-4">
        <div class="avatar avatar-lg mx-auto mb-3" style="background: linear-gradient(135deg, #00ba7c 0%, #1d9bf0 100%);">
            <i class="bi bi-person-plus"></i>
        </div>
        <h4 class="fw-bold mb-1">Crie sua conta</h4>
        <p class="text-muted small mb-0">Junte-se à nossa comunidade</p>
    </div>

    <form method="post" novalidate>
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
            <label for="{{ field.id_for_label }}" class="form-label fw-semibold small text-uppercase text-muted">
                {{ field.label }}
            </label>
            <input
                type="{{ field.field.widget.input_type }}"
                name="{{ field.html_name }}"
                id="{{ field.id_for_label }}"
                class="form-control rounded-pill px-3{% if field.errors %} is-invalid{% endif %}"
                {% if field.value %}value="{{ field.value }}"{% endif %}
                autocomplete="{% if field.field.widget.input_type == 'password' %}new-password{% else %}username{% endif %}"
            >
            {% if field.errors %}
            <div class="invalid-feedback d-block ps-2">
                {{ field.errors|join:", " }}
            </div>
            {% endif %}
        </div>
        {% endfor %}

        <button type="submit" class="btn btn-primary w-100 rounded-pill mt-3 py-2 fw-semibold">
            <i class="bi bi-check-circle me-1"></i>Cadastrar
        </button>
    </form>

    <div class="text-center mt-4 pt-3 border-top">
        <p class="text-muted small mb-0">
            Já tem conta?
            <a href="{% url 'login' %}" class="text-decoration-none fw-semibold">Entrar aqui</a>
        </p>
    </div>
</div>
{% endblock %}
