{% extends "base.html" %}
{% block title %}Deletar Post{% endblock %}

{% block content %}
<div class="post-card p-5 text-center">
    <div class="mb-4">
        <i class="bi bi-exclamation-triangle d-block mb-3" style="font-size: 3rem; color: var(--danger); opacity: 0.7;"></i>
        <h5 class="fw-bold mb-2">Deletar post?</h5>
        <p class="text-muted mb-3">Essa ação não pode ser desfeita.</p>
    </div>
    <div class="bg-light rounded p-3 mb-4 text-start">
        <p class="mb-0 fst-italic">"{{ object.content }}"</p>
    </div>
    <form method="post">
        {% csrf_token %}
        <div class="d-flex justify-content-center gap-2">
            <a href="{% url 'feed' %}" class="btn btn-outline-secondary rounded-pill px-4">Cancelar</a>
            <button type="submit" class="btn btn-danger rounded-pill px-4">
                <i class="bi bi-trash me-1"></i>Sim, deletar
            </button>
        </div>
    </form>
</div>
{% endblock %}
