{% extends "base.html" %}
{% block title %}Novo Post{% endblock %}

{% block content %}
<a href="{% url 'feed' %}" class="text-decoration-none d-inline-flex align-items-center gap-2 mb-4 action-btn text-muted">
    <i class="bi bi-arrow-left"></i> Voltar
</a>
<div class="post-card p-4">
    <div class="d-flex align-items-center gap-3 mb-4">
        <div class="avatar">{{ user.username|first|upper }}</div>
        <div>
            <h5 class="mb-0 fw-bold">Novo post</h5>
            <small class="text-muted">Compartilhe algo com seus seguidores</small>
        </div>
    </div>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            {{ form.content }}
        </div>
        <div class="d-flex justify-content-between align-items-center mt-3 pt-3 border-top">
            <span class="small text-muted">Máximo 280 caracteres</span>
            <div class="d-flex gap-2">
                <a href="{% url 'feed' %}" class="btn btn-outline-secondary rounded-pill">Cancelar</a>
                <button type="submit" class="btn btn-primary rounded-pill px-4">
                    <i class="bi bi-send me-1"></i>Publicar
                </button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
